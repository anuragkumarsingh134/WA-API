<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Status — WhatsApp API</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #e2e8f0;
        }

        .card {
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 16px;
            padding: 3rem;
            max-width: 420px;
            width: 90%;
            text-align: center;
            backdrop-filter: blur(12px);
        }

        .icon {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        h2 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        p {
            color: #94a3b8;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }

        .btn {
            display: inline-block;
            padding: 0.75rem 2rem;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: opacity 0.2s;
        }

        .btn:hover {
            opacity: 0.85;
        }

        .status-pending {
            color: #fbbf24;
        }

        .status-paid {
            color: #34d399;
        }

        .status-failed {
            color: #f87171;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(99, 102, 241, 0.3);
            border-top-color: #6366f1;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="card" id="statusCard">
        <div class="spinner"></div>
        <h2>Verifying Payment...</h2>
        <p>Please wait while we confirm your payment.</p>
    </div>

    <script>
        const API = window.location.origin;
        const token = localStorage.getItem('wa_token');
        const params = new URLSearchParams(window.location.search);
        const orderId = params.get('order_id');

        async function checkPayment() {
            if (!orderId || !token) {
                showResult('error', '❌', 'Invalid Request', 'Missing order or session info.');
                return;
            }

            try {
                const res = await fetch(`${API}/payment/verify/${orderId}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();

                if (data.status === 'paid') {
                    showResult('paid', '✅', 'Payment Successful!', 'Your plan has been activated. Enjoy!');
                } else if (data.status === 'pending') {
                    showResult('pending', '⏳', 'Payment Pending', 'Your payment is still being processed. Please check back later.');
                } else {
                    showResult('failed', '❌', 'Payment Failed', 'The payment was not completed. Please try again.');
                }
            } catch (err) {
                showResult('error', '❌', 'Verification Error', err.message);
            }
        }

        function showResult(status, icon, title, message) {
            document.getElementById('statusCard').innerHTML = `
                <div class="icon">${icon}</div>
                <h2 class="status-${status}">${title}</h2>
                <p>${message}</p>
                <a href="/" class="btn">Back to Dashboard</a>
            `;
        }

        checkPayment();
    </script>
</body>

</html>
